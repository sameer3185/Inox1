<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INOX Bags</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f9fafb;
      color: #333;
    }

    header {
      background: #111;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #1f2937;
    }

    nav a {
      color: #e5e7eb;
      padding: 14px 22px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      background: #4f46e5;
      color: white;
      border-radius: 6px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #6366f1, #3b82f6);
      color: white;
    }

    .hero h1 {
      font-size: 36px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #16a34a;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      background: #25D366;
      color: white;
      padding: 12px;
      border-radius: 8px;
      display: inline-block;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #128C7E;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>INOX Bags</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h1>Best Bags for Everyone</h1>
  <p>Stylish • Affordable • High Quality</p>
</section>

<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Bag">
    <h3>School Bag</h3>
    <p class="price">₹499</p>
    <a class="btn" href="https://wa.me/91XXXXXXXXXX">Buy on WhatsApp</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Bag">
    <h3>Travel Bag</h3>
    <p class="price">₹999</p>
    <a class="btn" href="https://wa.me/91XXXXXXXXXX">Buy on WhatsApp</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Bag">
    <h3>Laptop Bag</h3>
    <p class="price">₹799</p>
    <a class="btn" href="https://wa.me/91XXXXXXXXXX">Buy on WhatsApp</a>
  </div>

</section>

<footer>
  © 2026 INOX Bags | All Rights Reserved
</footer>

</body>
</html>
